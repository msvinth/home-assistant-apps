name: Build & Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - "copilot-terminal/**"
      - ".github/workflows/build-test.yml"

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: copilot-terminal/Dockerfile
          failure-threshold: error
          # HA apps use BUILD_FROM arg for base image; Debian apt-get and pipe-install patterns
          ignore: DL3006,DL3008,DL3013,DL4006

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/hassio-addons/debian-base/amd64:7.6.0
          - arch: aarch64
            build_from: ghcr.io/hassio-addons/debian-base/aarch64:7.6.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: ./copilot-terminal
          push: false
          # --load only works for native arch; cross-arch just verifies build succeeds
          load: ${{ matrix.arch == 'amd64' }}
          platforms: ${{ matrix.arch == 'amd64' && 'linux/amd64' || 'linux/arm64' }}
          tags: test/copilot-terminal:${{ matrix.arch }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}

      - name: Smoke test — image is runnable
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --entrypoint /bin/bash \
            test/copilot-terminal:amd64 -c "echo 'Image runs OK'"

      - name: Smoke test — scripts are executable
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --entrypoint /bin/bash \
            test/copilot-terminal:amd64 -c '
              for script in \
                /run.sh \
                /opt/scripts/copilot-session-picker.sh \
                /opt/scripts/setup-ha-mcp.sh \
                /opt/scripts/health-check.sh \
                /opt/scripts/welcome.sh; do
                if [ ! -x "$script" ]; then
                  echo "FAIL: $script is not executable"
                  exit 1
                fi
                echo "OK: $script"
              done
            '

      - name: Smoke test — key binaries available
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --entrypoint /bin/bash \
            test/copilot-terminal:amd64 -c '
              for bin in node npm copilot git tmux jq uv; do
                if ! which "$bin" > /dev/null 2>&1; then
                  echo "FAIL: $bin not found"
                  exit 1
                fi
                echo "OK: $bin"
              done
            '

      - name: Smoke test — copilot binary actually runs
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --entrypoint /bin/bash \
            test/copilot-terminal:amd64 -c '
              output=$(copilot --version 2>&1)
              if [ $? -ne 0 ] || [ -z "$output" ]; then
                echo "FAIL: copilot --version produced no output or failed"
                echo "Output: $output"
                exit 1
              fi
              echo "OK: $output"
            '
